services:
  - type: web
    name: pair-os
    runtime: node
    buildCommand: |
      rm -rf server/prisma/client prisma/client
      NODE_ENV=development npm install
      npm run build
      cd server
      NODE_ENV=development npm install
      npx prisma generate --schema=./prisma/schema.prisma
      npx prisma db push --accept-data-loss --schema=./prisma/schema.prisma
      npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /health
    plan: free
